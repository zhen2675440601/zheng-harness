name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect notepad changes
        id: note_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            notepads:
              - '.sisyphus/notepads/**'
              - 'scripts/check-notepads.ps1'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run notepad governance check
        if: steps.note_changes.outputs.notepads == 'true'
        shell: pwsh
        run: ./scripts/check-notepads.ps1

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run coverage tests
        run: go test -cover ./...
